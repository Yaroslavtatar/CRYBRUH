name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Upload Web Build
        uses: actions/upload-artifact@v3
        with:
          name: web-dist
          path: dist/

  build_desktop:
    name: Build Desktop (Electron Wrapper)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install Dependencies
        run: npm install

      # Here you would typically run an electron-builder command
      # Example: npm run build:desktop -- --win --mac --linux
      - name: Placeholder Desktop Build
        run: echo "Desktop build step..."
